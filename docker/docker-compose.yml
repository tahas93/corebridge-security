services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_secret
      POSTGRES_DB: corebridge_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d corebridge_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  cms-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cms-backend
    env_file:
      - ../cms/backend/.env
    environment:
      DATABASE_URL: postgresql://cms:cms_secret@postgres:5432/corebridge_cms?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
    ports:
      - "4000:4000"
    volumes:
      - cms_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  cms-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cms-admin
    ports:
      - "5173:80"
    depends_on:
      - cms-backend

  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    environment:
      CMS_API_URL: http://cms-backend:4000/api
      NEXT_PUBLIC_CMS_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - cms-backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - website
      - cms-backend
      - cms-admin

volumes:
  postgres_data:
  redis_data:
  cms_uploads:
